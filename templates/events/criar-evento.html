<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Treinamento - ListGGP</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        .bg-custom-teal { background-color: #00a2b9; }
        .text-custom-teal { color: #00a2b9; }
    </style>
</head>
<body class="bg-light">

    {% include 'partials/navbar.html' %}

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h2 class="m-0"><i class="bi bi-plus-circle-fill text-custom-teal me-2"></i>Novo Treinamento</h2>
            <a href="{% url 'index' %}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Voltar ao Início
            </a>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-custom-teal text-dark fw-bold fs-5">
                        <i class="bi bi-card-checklist me-2"></i>Preencha os dados do evento
                    </div>
                    
                    <div class="card-body p-4 fs-5">
                        <form method="POST">
                            {% csrf_token %} 
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold"><i class="bi bi-fonts me-2 text-secondary"></i>Nome do Evento</label>
                                {{ form.nm_evento }}
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold"><i class="bi bi-calendar-date me-2 text-secondary"></i>Data</label>
                                    {{ form.data }}
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold"><i class="bi bi-geo-alt me-2 text-secondary"></i>Local</label>
                                    {{ form.local }}
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold"><i class="bi bi-book me-2 text-secondary"></i>Aulas Vinculadas</label>
                                
                                <div class="bg-light border rounded p-3">
                                    {% for checkbox in form.aulas %}
                                        <div class="form-check mb-2">
                                            {{ checkbox.tag }}
                                            <label class="form-check-label ms-1" for="{{ checkbox.id_for_label }}">
                                                {{ checkbox.choice_label }}
                                            </label>
                                        </div>
                                    {% endfor %}
                                </div>
                                <small class="text-muted">Selecione as aulas que farão parte deste treinamento.</small>
                            </div>
                            
                            <hr class="my-4">
                            
                            <div class="d-flex justify-content-end gap-2">
                                <a href="{% url 'index' %}" class="btn btn-secondary btn-lg fw-bold px-4">Cancelar</a>
                                <button type="submit" class="btn btn-success btn-lg fw-bold px-4 shadow-sm">
                                    <i class="bi bi-check-circle me-2"></i>Salvar Treinamento
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

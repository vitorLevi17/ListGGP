{% load static %}

<style nonce="{{ request.csp_nonce }}">
    .logo-navbar { max-height: 55px; }
    .user-welcome-text { line-height: 1.2; }
</style>

<nav class="navbar bg-custom-teal px-4 py-2">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        
        <a class="navbar-brand m-0" href="#">
            <img src="{% static 'img/scmba_logo2.png' %}" alt="Logo Empresa" class="logo-navbar">
        </a>

        <div class="position-absolute start-50 translate-middle-x text-center text-dark fw-medium user-welcome-text">
            {% if request.user.is_authenticated %}
                <div class="fs-5">Bem-vindo(a),</div>
                <div class="fs-5">
                    {{ request.user.first_name|default:request.user.username|upper }}
                </div>
            {% endif %}
        </div>
        
        <div class="d-flex align-items-center">
            <a href="{% url 'logout' %}" class="nav-link text-dark fs-5 fw-medium">
                SAIR
            </a>
        </div>

    </div>
</nav>
